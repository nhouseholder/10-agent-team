# Model Tier Mapping
# Map tiers to your preferred providers. Change this once, all agents update.
#
# Tiers:
#   smart    — Complex reasoning, architecture, debugging
#   fast     — Quick tasks, research, docs, compaction
#   creative — UI/UX, design, visual work
#   reasoning — Deep analysis, multi-step logic
#
# Council requires 3 DIFFERENT providers for true multi-LLM consensus.

tiers:
  smart: "anthropic/claude-sonnet-4-6"
  fast: "anthropic/claude-haiku-4-5-20251022"
  creative: "anthropic/claude-sonnet-4-6"
  reasoning: "anthropic/claude-opus-4-6-20250514"

# Council models — 3 different reasoning models via OpenRouter (free)
# Each from a different training distribution for meaningful consensus
council:
  advocate-for: "openrouter/openai/gpt-oss-120b:free"
  advocate-against: "openrouter/xiaomi/mimo-v2-flash:free"
  judge: "openrouter/qwen/qwen3-235b-a22b-thinking-2507:free"

# Backup council models — swap in if any primary becomes unavailable
council-backup:
  - model: "openrouter/deepseek/deepseek-r1:free"
    role: "RL-trained reasoning specialist. AIME 87.5%, GPQA 81.0%. Slower but thorough."
  - model: "openrouter/meta-llama/llama-4-maverick:free"
    role: "General-purpose. 1M context. Strong multilingual. No native CoT."
  - model: "openrouter/google/gemma-3-27b-it:free"
    role: "Google's distribution. Single GPU. Multimodal. Weaker reasoning."

